# 模型配置
# 借鉴 porpoise-agent 的成本感知路由

providers:
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      - id: "deepseek-chat"
        name: "DeepSeek"
        context_window: 131072
        max_output_tokens: 16384
        cost_per_1k_input: 0.00014
        cost_per_1k_output: 0.00028
        suitable_for:
          - literature_search
          - data_analysis
          - report_generation
          - stats_code_generation
          - planning

      - id: "deepseek-reasoner"
        name: "DeepSeek (Reasoner)"
        context_window: 131072
        max_output_tokens: 16384
        cost_per_1k_input: 0.00055
        cost_per_1k_output: 0.00219
        suitable_for:
          - complex_reasoning
          - conservation_assessment
          - hypothesis_generation
          - emergence_detection
          - method_selection

routing:
  default: "deepseek-chat"
  reasoning: "deepseek-reasoner"
  strategy: "adaptive"
  rules:
    - phase: ["planner", "executor", "writer"]
      model: "deepseek-chat"
    - phase: ["analyst", "reviewer"]
      model: "deepseek-reasoner"
    - keyword_match: ["complex", "compare", "evaluate", "assess"]
      model: "deepseek-reasoner"

reasonix:
  cache_enabled: true
  harvest_enabled: true
  branch_count: 3
  repair_enabled: true
  retry:
    max_retries: 3
    backoff_base: 2
    jitter: true

# R 环境
r_environment:
  version: "4.6.0"
  packages:
    core:
      - vegan        # 群落生态学
      - SIBER        # 稳定同位素贝叶斯椭圆
      - geomorph     # 几何形态测量
      - adegenet     # 种群遗传学
      - hierfstat    # 群体遗传统计
      - lme4         # 混合效应模型
      - glmmTMB      # 广义线性混合模型
      - dismo        # 物种分布模型
      - ENMeval      # MaxEnt 模型评估
      - ggplot2      # 可视化
    auxiliary:
      - MASS
      - car
      - multcomp
      - ape
      - phangorn
      - raster
      - sf
      - sp
      - rgdal

# 成本追踪
cost_tracking:
  enabled: true
  budget_per_session_usd: 2.0
  warn_at_percent: 80
