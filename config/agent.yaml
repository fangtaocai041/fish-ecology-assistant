# Fish Ecology Assistant 主配置
# 借鉴 porpoise-agent 的结构化 YAML 架构

agent:
  name: "Fish Ecology Assistant"
  version: "1.0.0"
  lab: "Jianghan University / Freshwater Fisheries Research Center"
  description: "鱼类生态学 AI 研究助手 — Panta Rhei 动态世界观版"
  user: "Researcher — MSc Aquatic Biology"

orchestrator:
  max_steps: 100
  max_tool_calls_per_step: 5
  timeout_seconds: 300
  max_revision_rounds: 3
  human_in_loop: true
  approval_required_for:
    - field_survey_plan
    - conservation_recommendation
    - data_deletion
    - external_api_write
    - publication_draft

# 五阶段研究流水线路由
pipeline:
  stages:
    - id: planner
      name: "研究规划"
      skill: "research-planner"
      activation: "always"
      model: "default"

    - id: executor
      name: "文献搜索"
      skill: "research-executor"
      activation: "planner_returns_queries"
      model: "default"
      engines: ["tavily", "exa", "scholar", "article", "scholarly"]

    - id: analyst
      name: "数据分析"
      skill: "research-analyst"
      activation: "executor_returns_results"
      model: "reasoning"

    - id: writer
      name: "报告撰写"
      skill: "research-writer"
      activation: "analyst_returns_findings"
      model: "default"

    - id: reviewer
      name: "质量评审"
      skill: "research-reviewer"
      activation: "writer_produces_output"
      max_iterations: 3

# 子智能体配置
agents:
  literature:
    enabled: true
    model: "deepseek-chat"
    max_papers_per_search: 30
    sources:
      - tavily
      - exa
      - scholar
      - article
      - scholarly
    bilingual: true

  ecology:
    enabled: true
    model: "deepseek-reasoner"
    packages: ["vegan", "SIBER", "geomorph", "adegenet", "dismo", "lme4", "glmmTMB"]

  stats:
    enabled: true
    model: "deepseek-chat"
    r_version: "4.6.0"
    packages: ["vegan", "SIBER", "geomorph", "adegenet", "lme4", "glmmTMB", "ggplot2"]

  genetics:
    enabled: true
    model: "deepseek-reasoner"
    methods: ["eDNA", "RAD-seq", "microsatellite", "SNP"]

  conservation:
    enabled: true
    model: "deepseek-reasoner"

# 技能配置
skills:
  auto_discover: true
  skill_dir: ".reasonix/skills"
  default_mode: "subagent"
  pipeline_skills:
    - research-orchestrator
    - research-planner
    - research-executor
    - research-analyst
    - research-writer
    - research-reviewer
  domain_skills:
    - paper-analyzer
    - frontier-tracker
    - stats-assistant
    - stats-method-finder
    - phd-proposal-writer
    - ima-smart-search
    - verify-stats-handbook
    - zotero-assistant
    - obsidian-assistant
  guard_skills:
    - karpathy-guard

# 记忆配置
memory:
  type: "reasonix"
  max_context_tokens: 8000

# 知识库
knowledge_bases:
  ima:
    enabled: true
    count: 13
    description: "个人知识库 + 共享知识库"

# 涌现检测
emergence:
  enabled: true
  threshold: 3
  confidence_levels:
    3_sources: "low"
    4_sources: "medium"
    5_plus_sources: "high"
