yangtze_finless_porpoise:
  name: 长江江豚
  scientific: Neophocaena asiaeorientalis
  protection_level: 国家一级
  iucn: 极危(CR)
  population_trend: 稳中有升
  distribution: 范围有所扩大
  key_findings:
  - 长江中下游干流、洞庭湖、鄱阳湖个体数量整体稳中有升
  - 部分群体随季节在不同区域迁移
  - 禁捕后种群规模有望稳中有升
  research_group: 淡水渔业研究中心 刘凯研究员课题组
  dedicated_agent: porpoise-agent
