exotic_species_note: '2017-2021年调查新采集到15种外来鱼类。主要来源为养殖逃逸、 观赏鱼放生等。外来种对长江本土鱼类群落的影响需持续监测。

  '
environment:
  water_quality: 总体较好，整体符合渔业水质标准
  water_surface_max: 19663 km² (2019-2020)
  water_surface_min: 14281 km² (2019-2020)
  fluctuation_zone_total: 6337 km²
  fluctuation_zone_counter_seasonal: 633 km²
  note: 衰退的消落区将成为制约未来长江水生生态系统恢复的限制性因素
fishing_ban:
  status: 2021年起长江十年禁捕
  expected_impact:
  - 鱼类资源将有显著恢复
  - 长江江豚种群规模有望稳中有升
  - 濒危鱼类的处境依然堪忧
  pre_ban_fishermen: 以初中学历以下的中老年为主
species_count: 397
taxonomy_changelog:
- date: '2026-06-17'
  source: 长江水生生物资源与环境本底状况调查(2017-2021)
  doi: 10.11964/jfc.20220913677
  changes:
  - 导入425种长江鱼类，覆盖18目37科163属
  - 按PDF最新分类系统：Cyprinidae(鲤科)仍为最大科，Xenocyprididae(鲌科)独立分科
  - Balitoridae(条鳅科)在长江上游多样性最高(68种)
  - 新增47个科的英文标准命名映射
  notable_reclassifications:
  - Coilia ectenes → 并入Coilia nasus (刀鲚单型种确认)
  - Tribolodon hakonensis → Pseudaspius hakonensis (属级变更)
  - Culter alburnus / Chanodichthys 系统发生重新划分
  - '鲤科(Cyprinidae)拆分为多个科: Xenocyprididae, Acheilognathidae 等'
  conservation_highlights:
  - 'CR(极危): 23种 — 白鲟、中华鲟、长江鲟、鯮、鳤等'
  - 'EN(濒危): 20种 — 花鳗鲡、成都鱲、稀有鮈鲫等'
  - 'VU(易危): 38种'
  - 'NT(近危): 30种'
  - 'LC(无危): 139种 — 约1/3'
  - 'DD(数据缺乏): 73种 — 大量小型鱼类数据不足'
