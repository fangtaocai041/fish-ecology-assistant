# ══════════════════════════════════════════════════════════════
# 29 种国家重点保护鱼类 (仅15种在调查中记录到)
# ══════════════════════════════════════════════════════════════
protected_species:
  recorded:
    - name: "中华鲟"
      scientific: "Acipenser sinensis"
      protection_level: "国家一级"
      status: "多年未见自然繁殖"
      iucn: "极危(CR)"
    - name: "长江鲟"
      scientific: "Acipenser dabryanus"
      protection_level: "国家一级"
      status: "IUCN认定野外灭绝(EW)"
      iucn: "野外灭绝(EW)"
    - name: "胭脂鱼"
      scientific: "Myxocyprinus asiaticus"
      protection_level: "国家二级"
      status: "多年未见自然繁殖"
    - name: "松江鲈"
      scientific: "Trachidermus fasciatus"
      protection_level: "国家二级"
      status: "多年未见自然繁殖"
  
  missing_or_extinct:
    - name: "白鲟"
      scientific: "Psephurus gladius"
      protection_level: "国家一级"
      status: "IUCN认定灭绝(EX)"
      iucn: "灭绝(EX)"
    - name: "鯮"
      scientific: "Luciobrama macrocephalus"
      protection_level: "国家二级"
      status: "多年未见野生个体"
    - name: "鲥"
      scientific: "Tenualosa reevesii"
      protection_level: "国家一级"
      status: "多年未见野生个体"

# ══════════════════════════════════════════════════════════════
# 长江江豚 (本次调查核心发现)
# ══════════════════════════════════════════════════════════════
yangtze_finless_porpoise:
  name: "长江江豚"
  scientific: "Neophocaena asiaeorientalis"
  protection_level: "国家一级"
  iucn: "极危(CR)"
  population_trend: "稳中有升"
  distribution: "范围有所扩大"
  key_findings:
    - "长江中下游干流、洞庭湖、鄱阳湖个体数量整体稳中有升"
    - "部分群体随季节在不同区域迁移"
    - "禁捕后种群规模有望稳中有升"
  research_group: "淡水渔业研究中心 刘凯研究员课题组"
  dedicated_agent: "porpoise-agent"

