# ============================================================
# 物种拼写变体配置 — Species Variants Configuration
# ============================================================
# 用于自动覆盖已知的学名拼写错误、别名、中文异名。
# 所有搜索 Skills 执行前应读取此文件，避免漏检。
#
# 格式规范：
#   scientific_name: 权威学名（GBIF / FishBase / Catalog of Fishes 核验）
#   known_misspellings: OCR/转录导致的常见错误拼法
#   taxonomic_synonyms: 分类学异名（已归并的曾用名）
#   chinese_aliases: 中文别名（含地方名、俗称）
#   target_journals: 该物种相关研究的高频发表期刊（用于期刊定向扫描）
# ============================================================

species:

  # ── 鳤 ──────────────────────────────────────────────────
  Ochetobius_elongatus:
    scientific_name: "Ochetobius elongatus"
    authority: "(Kner, 1867)"
    family: "Cyprinidae"
    subfamily: "Leuciscinae"
    common_name_cn: "鳤"
    iucn_status: "CR"                          # Critically Endangered (中国红色名录)
    
    # OCR/转录常见错误 (> 必须同时搜索)
    known_misspellings:
      - "Ochetobibus elongatus"                # 常见: i 插入 (MDPI Animals 2026 论文标题中)
      - "Ochetobius elongates"                 # 尾字母脱落
      - "Ochetobius elongatu"                  # 尾部截断
      - "Ochetobius elongtus"                  # 中间字母脱落
      - "Ochetobius e-longatus"                # 连字符分割
      - "Ochotobius elongatus"                 # 元音替换
    
    # 分类学异名 (历史曾用名)
    taxonomic_synonyms:
      - "Luciobrama macrocephalus"             # 曾被归入 Luciobrama 属
      - "Opsarius elongatus"                   # 原始描述用名
    
    # 中文别名
    chinese_aliases:
      - "鳤"
      - "鳤鱼"
      - "金刀鱼"
      - "竹四鱼"
      - "长江鳤"
    
    # 高频目标期刊 (作者曾发表的期刊优先)
    target_journals:
      - "Animals"
      - "Scientific Data"
      - "Mitochondrial DNA"
      - "Conservation Genetics Resources"
      - "南方水产科学"
      - "生物多样性"
      - "水生生物学报"
      - "Journal of Fish Biology"
      - "Gene"

  # ── 鯮 ──────────────────────────────────────────────────
  Luciobrama_macrocephalus:
    scientific_name: "Luciobrama macrocephalus"
    authority: "(Lacepède, 1803)"
    family: "Cyprinidae"
    subfamily: "Leuciscinae"
    common_name_cn: "鯮"
    iucn_status: "CR"
    
    known_misspellings:
      - "Luciobrama macrocephala"
      - "Luciobrama microcephalus"
      - "Luciobrama macrocephalu"
    
    taxonomic_synonyms:
      - "Synodus macrocephalus"
    
    chinese_aliases:
      - "鯮"
      - "鯮鱼"
      - "尖头鳡"
      - "马头鯮"
    
    target_journals: []

  # ── 鱤 ──────────────────────────────────────────────────
  Elopichthys_bambusa:
    scientific_name: "Elopichthys bambusa"
    authority: "(Richardson, 1845)"
    family: "Cyprinidae"
    subfamily: "Leuciscinae"
    common_name_cn: "鱤"
    iucn_status: "LC"
    
    known_misspellings:
      - "Elopichthys bambus"
      - "Elopichthis bambusa"
      - "Elopichthys bambusa"
    
    taxonomic_synonyms:
      - "Leuciscus bambusa"
    
    chinese_aliases:
      - "鱤"
      - "鱤鱼"
      - "黄钻"
      - "竿鱼"
      - "水老虎"
      - "铜头鱼"
    
    target_journals: []

# ============================================================
# 搜索规则 (所有 Skills 通用)
# ============================================================
search_rules:
  # OCR 错误模型 (v3.2 新增) — 自动生成拼写变体
  ocr_error_model:
    enabled: true
    strategies:
      - "letter_insertion"       # 辅音插入: Ochetobius → Ochetobibus
      - "letter_deletion"        # 字母删除: Ochetobius → Ochetobus
      - "vowel_confusion"       # 元音替换: e↔i, a↔o, u↔o
      - "tail_drop"              # 尾字母脱落: elongatus → elongatu, elongates
      - "hyphen_split"           # 连字符分割: elongatus → e-longatus
      - "doubling"               # 双写/单写: l↔ll, s↔ss
    max_generated_variants: 15
    
  # 拼写变体搜索策略
  variant_strategy:
    mode: "exhaustive"                         # exhaustive / first_hit / top3
    max_variants_per_search: 10
    merge_dedup: true
    
  # 多 query 并行策略 (v3.2 新增)
  multi_query_parallel:
    enabled: true
    ecology_keywords:                           # 与学名组合搜索的生态关键词
      - "diet"
      - "feeding"
      - "habitat"
      - "reproduction" 
      - "conservation"
      - "genome"
      - "morphology"
      - "population"
      - "genetics"
      - "growth"
    parallel_sources:                           # 每个 query 并行调用的数据源
      - "ncbi_esearch"
      - "scholar_search_literature_graph"
      - "article_search_literature"
    
  # 新论文检测规则 (v3.2 新增)
  new_paper_detection:
    enabled: true
    rule: |
      IF paper.year >= current_year - 1 AND paper.pmid IS NULL
      THEN flag = "⚠️ 新论文，PubMed 尚未索引"
           recommend = "直接通过 DOI 访问验证"
    doi_fallback: true                          # 无 PMID 时尝试通过 DOI 获取元数据
    
  # 中文回溯策略
  chinese_backtrack:
    enabled: true
    sources:
      - "引用回溯"                              # 从英文论文 References 找中文论文
      - "期刊定向扫描"                           # 扫描 target_journals
      - "CNKI 交叉验证"                          # 知网搜索（需机构 VPN）
    
  # 置信度规则
  confidence:
    direct_api_extract: "✅ 确认"               # 从 PubMed API Affiliation 直接提取
    crossref_verified: "✅ 确认"                 # Crossref API 有完整元数据
    citation_backtrack: "⚠️ 需核实"             # 从引用回溯发现，中文期刊可能不在 Crossref
    manual_annotation: "❓ 需人工核实"           # 仅凭标题推断
    new_unindexed: "🆕 新论文"                   # DOI 已注册但 PubMed 尚未索引

