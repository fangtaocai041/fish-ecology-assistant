# ═══════════════════════════════════════════════════════════════════
# 鱼类物种知识库 — Fish Species Knowledge Base (多流域版)
# ═══════════════════════════════════════════════════════════════════
# 分类体系: 大陆板块 → 国家 → 流域 → 物种
#
# 数据来源:
#   [长江] 《长江水生生物资源与环境本底状况调查(2017-2021)》
#          水产学报 DOI:10.11964/jfc.20220913677
#           中国水产科学研究院总牵头，24家科研院所
#   [图们江/绥芬河] 文献补充 + 物种分布记录
#
# 核心发现 (长江调查):
#   - 历史记录443种(18目37科163属)，2017-2021采集到323种(含15种外来)
#   - 鱼类资源量约8.86亿尾/12.48万t，仅相当于1950年代的27.3%
#   - 29种国家重点保护鱼类，仅记录到15种
#   - 白鲟(IUCN灭绝)、鯮和鲥(多年未见)、长江鲟(IUCN野外灭绝)
#   - 中华鲟/胭脂鱼/松江鲈 多年未见自然繁殖
#   - 长江江豚种群稳中有升，分布范围扩大
# ===================================================================

metadata:
  title: "鱼类物种知识库（多流域版）"
  version: "2.1"
  sources:
    - name: "长江水生生物资源与环境本底状况调查(2017-2021)"
      doi: "10.11964/jfc.20220913677"
      journal: "水产学报"
      survey_period: "2017-2021"
      scope: "长江流域 (干流 + 10条主要支流/附属湖泊)"
      total_historical_species: 443
      total_collected_2017_2021: 323
      missing_species: 135
      exotic_newly_recorded: 15
      estimated_population: "8.86亿尾 / 12.48万t"
      compared_to_1950s: "27.3%"
      compared_to_1980s: "58.7%"
    - name: "图们江/绥芬河鱼类补充"
      note: "东北亚溯河洄游鱼类分布数据，持续扩充中"

