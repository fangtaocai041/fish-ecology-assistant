metadata:
  title: 鱼类物种知识库（多流域版）
  version: '2.1'
  sources:
  - name: 长江水生生物资源与环境本底状况调查(2017-2021)
    doi: 10.11964/jfc.20220913677
    journal: 水产学报
    survey_period: 2017-2021
    scope: 长江流域 (干流 + 10条主要支流/附属湖泊)
    total_historical_species: 443
    total_collected_2017_2021: 323
    missing_species: 135
    exotic_newly_recorded: 15
    estimated_population: 8.86亿尾 / 12.48万t
    compared_to_1950s: 27.3%
    compared_to_1980s: 58.7%
  - name: 图们江/绥芬河鱼类补充
    note: 东北亚溯河洄游鱼类分布数据，持续扩充中
classification:
- continent: 亚洲
  countries:
  - name: 中国
    basins:
    - name: 长江流域
      id: yangtze
      sub_areas:
      - 干流
      - 雅砻江
      - 横江
      - 岷江
      - 赤水河
      - 沱江
      - 嘉陵江
      - 乌江
      - 汉江
      - 洞庭湖
      - 鄱阳湖
    - name: 图们江流域
      id: tumen
      note: 中朝俄界河，东北亚特有鱼类分布区
    - name: 绥芬河流域
      id: suifen
      note: 中俄界河，溯河洄游鱼类通道
    - name: 黑龙江流域
      id: heilongjiang
      note: 中俄界河，冷水性鱼类区系
    - name: 珠江水系
      id: pearl
