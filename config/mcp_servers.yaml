# MCP Server Configuration
# Fish Ecology Assistant — 21 个 MCP 服务器
# 借鉴 porpoise-agent 的结构化服务器定义

servers:
  # ===== 学术搜索 (5) =====
  # 全部免费 · 科研聚焦
  scholar:
    name: Scholar MCP
    command: npx
    args: ["-y", "scholar-mcp"]
    description: Google Scholar + full-text literature search
    category: search
    enabled: true

  article:
    name: Article MCP
    command: npx
    args: ["-y", "article-mcp"]
    description: PMC full-text + journal quality (EasyScholar + OpenAlex)
    category: search
    enabled: true

  scholarly:
    name: Scholarly MCP
    command: npx
    args: ["-y", "scholarly-research-mcp"]
    description: Multi-source academic cross-database (Semantic Scholar + PubMed + arXiv + JSTOR)
    category: search
    enabled: true

  ncbi:
    name: NCBI MCP
    command: node
    args: [".reasonix/mcp-servers/ncbi-mcp.mjs"]
    description: PubMed E-utilities — ESearch + ESummary + EFetch (citation backtracking)
    category: search
    enabled: true

  tavily:
    name: Tavily MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\tavily.bat"]
    description: AI-powered deep web search (15 results, advanced mode)
    category: search
    enabled: true
    requires_api_key: true

  exa:
    name: Exa MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\exa.bat"]
    description: Semantic search — meaning-aware web search
    category: search
    enabled: true
    requires_api_key: true

  # ===== 数据与文件 (3) =====
  filesystem:
    name: Filesystem MCP
    command: npx
    args: ["-y", "@anthropic/mcp-server-filesystem", "."]
    description: Secure file read/write within project directory
    category: data
    enabled: true

  github:
    name: GitHub MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\github.bat"]
    description: GitHub API — repos, issues, PRs, code search
    category: data
    enabled: true
    requires_api_key: true

  git:
    name: Git MCP
    command: npx
    args: ["-y", "@anthropic/mcp-server-git"]
    description: Git version control
    category: data
    enabled: true

  # ===== 计算与可视化 (4) =====
  echarts:
    name: Echarts MCP
    command: npx
    args: ["-y", "echarts-mcp"]
    description: Data visualization — publication-ready charts
    category: compute
    enabled: true

  coderunner:
    name: Code Runner MCP
    command: npx
    args: ["-y", "mcp-server-code-runner@latest"]
    description: Multi-language code sandbox (Python/R/JS)
    category: compute
    enabled: true

  rplay:
    name: R Play MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\rplay.bat"]
    description: R 4.6.0 — morphometrics, isotopes, community ecology
    category: compute
    enabled: true

  thinking:
    name: Sequential Thinking MCP
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    description: Multi-step chain-of-thought reasoning
    category: compute
    enabled: true

  # ===== 图像与浏览器 (3) =====
  ocr:
    name: PaddleOCR MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\paddleocr.bat"]
    description: Chinese/English OCR — tables, formulas, handwriting
    category: image
    enabled: true
    requires_api_key: true

  ocr_fallback:
    name: OCR Fallback MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\ocr-fallback.bat"]
    description: Offline OCR (Tesseract.js) — no network required
    category: image
    enabled: true
    requires_local_install: true

  playwright:
    name: Playwright MCP
    command: npx
    args: ["-y", "@playwright/mcp"]
    description: Browser automation — screenshots, scraping, forms
    category: image
    enabled: true

  # ===== 知识管理 (2) =====
  zotero:
    name: Zotero MCP
    command: cmd
    args: ["/c", ".reasonix\\mcp-servers\\zotero.bat"]
    description: Direct Zotero SQLite queries — reference management
    category: knowledge
    enabled: true
    requires_local_path: true

  obsidian:
    name: Obsidian MCP
    command: npx
    args: ["-y", "obsidian-mcp"]
    description: Obsidian vault read/write — research notes management
    category: knowledge
    enabled: true

  # ===== DeepWiki 知识源 (P3 集成) =====
  deepwiki:
    name: DeepWiki MCP
    transport: sse
    url: "https://mcp.deepwiki.com/sse"
    description: AI-generated repo documentation — ask questions about any codebase
    enabled: true
    tools:
      - ask_question
      - read_wiki_structure
      - read_wiki_contents

# 服务器类别统计
# 19 个定义的服务 + web_search(built-in) + thinking(built-in) = 21 工具可用
categories:
  search: 7                      # scholar/article/scholarly/ncbi/tavily/exa/deepwiki + web_search(built-in)
  data: 3                        # filesystem/github/zotero
  compute: 4                     # coderunner/rplay/git/echarts
  image: 3                       # playwright/ocr/ocr_fallback
  knowledge: 3                   # obsidian/thinking(built-in)/deepwiki
  total: 21

# ===== 搜索引擎激活状态 (v2.0) =====
search_engine_status:
  activated_session:             # 当前会话中可用
    - ncbi                       # ✅ node ncbi-mcp.mjs (已注册)
    - web_search                 # ⚠️ Reasonix 内置 (fetch failed, 待排查)
  activated_next_startup:        # 下次启动后生效 (Reasonix 已注册，需重启)
    - scholar                    # npx scholar-mcp
    - article                    # npx article-mcp
    - scholarly                  # npx scholarly-research-mcp
    - tavily                     # npx tavily-mcp@latest (需要 TAVILY_API_KEY)
    - exa                        # npx exa-mcp-server (需要 EXA_API_KEY)
  api_keys:
    TAVILY_API_KEY: "configured_in_.env"
    EXA_API_KEY: "configured_in_.env"
  note: "scholar/article/scholarly/tavily/exa 的 MCP 工具在下一次 Reasonix 启动后生效。API key 已在 .env 中配置。"
