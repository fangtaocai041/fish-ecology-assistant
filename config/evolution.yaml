# ENGINEERING: params auto-adjusted per trigger conditions after each research pipeline run.
# All values are machine-readable; ranges define safe boundaries; triggers use exact thresholds.
# 借鉴: cognitive-search-engine/config/evolution.yaml (4 adaptive params + feedback loop)
# 传播: porpoise-agent/config/evolution.yaml (同步创建)

evolution:
  enabled: true
  last_updated: "2026-06-07"

  # ===== 自适应参数 =====
  adaptive_params:
    min_sources_core_claim:
      current: 3
      range: [2, 5]
      adjust_by: "false_positive_rate"   # 验证失败率高 → 增加最少来源数
      description: "核心声明最少独立来源数 (三角验证 FB-1/FB-2)"
      last_adjusted: "2026-06-07"

    max_revision_rounds:
      current: 3
      range: [2, 5]
      adjust_by: "quality_gap"           # 评审分数持续偏低 → 增加修订轮次
      description: "研究报告最大修订迭代次数"
      last_adjusted: "2026-06-07"

    contradiction_budget_multiplier:
      current: 2.5
      range: [1.5, 4.0]
      adjust_by: "contradiction_impact"  # 主要矛盾解决率低 → 增加资源倾斜
      description: "主要矛盾方向获得 N× 资源 (CP-2)"
      last_adjusted: "2026-06-07"

    emergence_threshold:
      current: 3
      range: [2, 6]
      adjust_by: "noise_rate"            # 涌现误报率高 → 提高阈值
      description: "触发涌现信号的最小独立源数量"
      last_adjusted: "2026-06-07"

    skill_activation_threshold:
      current: 0.3
      range: [0.1, 0.5]
      adjust_by: "efficiency_gain"       # 效率提升时 → 提高阈值 (更少 skill 激活)
      description: "DS-2 稀疏激活: skill 激活的最低条件匹配分数"
      last_adjusted: "2026-06-07"

    search_engine_count:
      current: 11
      range: [5, 11]
      adjust_by: "token_efficiency"      # token 效率低时 → 减少并行引擎数
      description: "并行使用的搜索引擎数量"
      last_adjusted: "2026-06-07"

  # ===== 进化日志 =====
  evolution_log:
    path: ".evolution/evolution-log.jsonl"
    fields: [timestamp, param, old_value, new_value, trigger, pre_metric, post_metric, session_id]
    max_entries: 1000

  # ===== 自我反馈循环 =====
  feedback_loop:
    # 每次研究 pipeline 执行后评估效果
    post_pipeline_evaluation: true
    metrics:
      - verification_pass_rate       # 通过验证 (≥min_sources) 的声明比例
      - pipeline_completion_rate     # 完整 5 阶段完成的 session 比例
      - contradiction_resolution_rate # 主要矛盾成功解决的比例
      - emergence_signal_ratio       # 涌现信号 / 总 session 比率
      - token_efficiency             # 产出量 / 1000 tokens
      - reviewer_score_avg           # 平均评审分数 (0-100)
      - skill_activation_count       # 实际激活的 skill 数量 (DS-2 稀疏激活)
      - search_precision             # 搜索结果精度

    # ===== 触发自进化的条件 =====
    evolution_triggers:
      verification_weak:             # 验证通过率持续偏低
        condition: "verification_pass_rate < 0.5 for 3 consecutive sessions"
        action: "increase min_sources_core_claim by 1 AND increase max_revision_rounds by 1"

      quality_decline:               # 评审分数持续下降
        condition: "reviewer_score_avg < 60 for 3 consecutive sessions"
        action: "increase max_revision_rounds by 1"

      contradiction_unresolved:      # 主要矛盾长期未解决
        condition: "contradiction_resolution_rate < 0.3 for 5 consecutive sessions"
        action: "increase contradiction_budget_multiplier by 0.5"

      emergence_noise:               # 涌现信号过多 (可能是误报)
        condition: "emergence_signal_ratio > 0.5 for 5 consecutive sessions"
        action: "increase emergence_threshold by 1"

      efficiency_gain:               # token 效率持续提升
        condition: "token_efficiency > baseline × 1.2 for 5 consecutive sessions"
        action: "increase skill_activation_threshold by 0.05 (更少 skill 激活)"

      efficiency_loss:               # token 效率持续下降
        condition: "token_efficiency < baseline × 0.7 for 5 consecutive sessions"
        action: "decrease search_engine_count by 2 (减少并行引擎节约 token)"

      pipeline_failure_spike:        # 管线失败率飙升
        condition: "pipeline_completion_rate < 0.4 for 3 consecutive sessions"
        action: "log alert + suggest pipeline stage simplification"

  # ===== 跨项目进化数据共享 =====
  cross_project:
    enabled: true
    coordination_ref: "${REASONIX_HOME:-D:\\Reasonix}/coordination.yaml"
    shared_metrics:
      - verification_pass_rate
      - contradiction_resolution_rate
    peers:
      porpoise:
        evolution_path: "../porpoise-agent/config/evolution.yaml"
        share: ["verification_pass_rate", "contradiction_resolution_rate"]
      cognitive:
        evolution_path: "../cognitive-search-engine/config/evolution.yaml"
        share: ["verification_pass_rate", "false_positive_rate"]
