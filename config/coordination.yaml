# 求同存异协调配置 — Coordination Config
# Shared between fish-ecology-assistant and porpoise-agent
# 求同 (Common Ground): shared protocols, rule IDs, verification standards
# 存异 (Reserved Differences): project-specific implementations

coordination:
  version: "2.0.0"

  # ===== 求同: 共享协议 =====
  shared_protocols:
    preflight: "read config/agent.yaml before all Skills"
    rule_ids: ["FB-1","FB-2","CP-1","CP-2","SM-1","SM-2","WF-1","WF-2","PT-1","PT-2","EH-1","EH-2","MO-1","MO-2","DS-1","DS-2","DS-3","DS-4"]
    verification: { min_sources_core_claim: 3, max_iterations: 3 }
    contradiction: { budget_multiplier: 2.5, transformation_threshold: 5 }

  # ===== 存异: 项目特定 =====
  project_specific:
    cognitive_search:
      skill_dir: "external/cognitive-search-engine/skills"
      skills: ["graph-search-engine","cognitive-species-search","self-evolve"]
      versions: { graph-search-engine: "4.1.0" }
      description: "认知搜索引擎 v4.1 — 7引擎图谱遍历 + 自适应深度 + 引用验证 + TOOL_REGISTRY"
    fish:
      skill_dir: ".reasonix/skills"
      pipeline_type: "explicit_stages"
      skill_count: 24
      mcp_count: 21
      search_engines: 7          # ncbi + scholar + article + scholarly + tavily + exa + web_search
      memory: "reasonix"
    porpoise:
      skill_dir: "src/skills"
      pipeline_type: "orchestrator"
      skill_count: 16
      mcp_count: 16
      memory: "chromadb"

  # ===== 桥接: 跨项目委托 =====
  cross_delegation:
    enabled: true
    protocol: "DELEGATE to {project}: skill={name} context={...}"
    fish_exports: ["stats-assistant","research-analyst","phd-proposal-writer","ima-smart-search"]
    porpoise_exports: ["detect-clicks","estimate-abundance","assess-threats","search-literature"]

  # ===== 搜索引擎注册表 (v2.0, 三项目共享) =====
  search_engine_registry:
    ncbi:
      category: "academic"
      requires_api_key: false
      mcp_server: "ncbi"
      tools: ["ncbi_ncbi_esearch","ncbi_ncbi_esummary","ncbi_ncbi_efetch"]
      fallback_priority: 4
    scholar:
      category: "academic"
      requires_api_key: false
      mcp_server: "scholar"
      tools: ["scholar_search_literature_graph","scholar_search_google_scholar_key_words"]
      fallback_priority: 1
    article:
      category: "academic"
      requires_api_key: false
      mcp_server: "article"
      tools: ["article_search_literature","article_get_article_details","article_get_references"]
      fallback_priority: 2
    scholarly:
      category: "academic"
      requires_api_key: false
      mcp_server: "scholarly"
      tools: ["scholarly_search"]
      fallback_priority: 3
    tavily:
      category: "web"
      requires_api_key: true
      env_var: "TAVILY_API_KEY"
      mcp_server: "tavily"
      tools: ["tavily_search","tavily_extract"]
      fallback_priority: 5
    exa:
      category: "web"
      requires_api_key: true
      env_var: "EXA_API_KEY"
      mcp_server: "exa"
      tools: ["exa_web_search"]
      fallback_priority: 6
    web_search:
      category: "builtin"
      requires_api_key: false
      mcp_server: "reasonix_builtin"
      tools: ["web_search","web_fetch"]
      fallback_priority: 7
    note: "MCP 服务器 (scholar/article/scholarly/tavily/exa) 需在 Reasonix 下次启动后生效"

  # ===== 并行策略 =====
  parallelism:
    search_engines:
      max_concurrent: 7
      strategy: "fan_out"
      engines: ["ncbi","scholar","article","scholarly","tavily","exa","web_search"]
    kb_search:
      max_concurrent: 13
      strategy: "fan_out"
    domain_skills:
      max_concurrent: 3
      strategy: "independent"
    cross_project:
      max_concurrent: 2
      strategy: "fan_out"

  # ===== 串联策略 =====
  serialism:
    pipeline_stages:
      gate: "no_skip"
      retreat: "allow"
      retreat_strategy: "return_to_planner"
    primary_tasks:
      strategy: "sequential"
      reason: "WF-1: 各个歼灭 — 不并行处理两个主矛盾"
    human_gates:
      strategy: "blocking"
      phases: ["field_survey_plan","conservation_recommendation","data_deletion","external_api_write","publication_draft"]

  # ===== 激活顺序 (统一) =====
  activation_order:
    - { stage: 0, name: "PREFLIGHT", rule: null, parallel: false }
    - { stage: 1, name: "Contradiction Analysis", rule: "CP-1,CP-2", parallel: false }
    - { stage: 2, name: "Domain Execution", rule: null, parallel: true }
    - { stage: 3, name: "Verification", rule: "FB-1,FB-2", parallel: false }
    - { stage: 4, name: "Review + Adapt", rule: "MO-1,MO-2,DS-1..4", parallel: false }
