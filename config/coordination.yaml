# 求同存异协调配置 — Coordination Config v2.0
# Shared between all Reasonix ecosystem projects
# 求同 (Common Ground): shared protocols, MAGMA memory, verification standards
# 存异 (Reserved Differences): project-specific implementations

coordination:
  version: "2.0.0"

  # ===== MAGMA 四维正交图谱记忆标准 =====
  memory:
    default_backend: "magma"    # magma | dict
    nx_available: true          # NetworkX graph analytics
    encoder: "char_ngram"       # char_ngram | huggingface
    dimensions:
      - semantic                # 语义图: 内容相似性
      - temporal                # 时序图: 时间关联
      - causal                  # 因果图: 因果关系
      - entity                  # 实体图: 物种/实体指代
    consolidation:
      stm_capacity: 100
      ltm_capacity: 10000
      threshold: 3              # 访问3次 → STM→LTM

  # ===== 求同: 共享协议 =====
  shared_protocols:
    preflight: "read config/agent.yaml before all Skills"
    rule_ids: ["FB-1","FB-2","CP-1","CP-2","SM-1","SM-2","WF-1","WF-2","PT-1","PT-2","EH-1","EH-2","MO-1","MO-2","DS-1","DS-2","DS-3","DS-4"]
    verification: { min_sources_core_claim: 2, max_iterations: 3 }
    contradiction: { budget_multiplier: 2.5, transformation_threshold: 5 }
    kb_first: true              # 知识库优先查询
    triangle_verify: true       # 三角验证: ≥3独立源

  # ===== 存异: 项目特定 =====
  project_specific:
    fish:
      skill_dir: ".reasonix/skills"
      pipeline_type: "explicit_stages"
      skill_count: 15
      mcp_count: 18
      memory: "magma"           # MAGMA 四维图谱记忆
      species_db: "fishkb/config/fish_species_index.yaml"
      species_count: 430
    porpoise:
      skill_dir: "src/skills"
      pipeline_type: "orchestrator"
      skill_count: 16
      mcp_count: 16
      memory: "magma"

  # ===== 桥接: 跨项目委托 =====
  cross_delegation:
    enabled: true
    protocol: "DELEGATE to {project}: skill={name} context={...}"
    fish_exports: ["stats-assistant","research-analyst","phd-proposal-writer","ima-smart-search"]
    porpoise_exports: ["detect-clicks","estimate-abundance","assess-threats","search-literature"]

  # ===== 并行策略 =====
  parallelism:
    search_engines:
      max_concurrent: 5
      strategy: "fan_out"
      engines: ["tavily","exa","scholar","article","scholarly"]
    kb_search:
      max_concurrent: 13
      strategy: "fan_out"
    domain_skills:
      max_concurrent: 3
      strategy: "independent"
    cross_project:
      max_concurrent: 2
      strategy: "fan_out"

  # ===== 串联策略 =====
  serialism:
    pipeline_stages:
      gate: "no_skip"
      retreat: "allow"
      retreat_strategy: "return_to_planner"
    primary_tasks:
      strategy: "sequential"
      reason: "WF-1: 各个歼灭 — 不并行处理两个主矛盾"
    human_gates:
      strategy: "blocking"
      phases: ["field_survey_plan","conservation_recommendation","data_deletion","external_api_write","publication_draft"]

  # ===== 激活顺序 (统一) =====
  activation_order:
    - { stage: 0, name: "PREFLIGHT", rule: null, parallel: false }
    - { stage: 1, name: "Contradiction Analysis", rule: "CP-1,CP-2", parallel: false }
    - { stage: 2, name: "Domain Execution", rule: null, parallel: true }
    - { stage: 3, name: "Verification", rule: "FB-1,FB-2", parallel: false }
    - { stage: 4, name: "Review + Adapt", rule: "MO-1,MO-2,DS-1..4", parallel: false }
