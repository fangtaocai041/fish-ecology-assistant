# ============================================================
# 道生一 · 一生二 · 二生三 · 三生万物
# ============================================================
# 道 (Dao)     = 外界 — 用户的研究问题, 现实世界的生态学需求
# 一 (One)     = 输入命令到模型 — fish-ecology-assistant 作为统一入口
# 二 (Two)     = 太极生两仪 — S(知识/静/阴) ↔ V(验证/动/阳) 二元对立
# 三 (Three)   = 三角结构 — fish(S) + cognitive(V) + eon-core(Coordinator)
#                矛盾统一体, 产生结构的最小封闭集合
# 万物 (Myriad)= 所有事物 — 衍生项目 + Skills + 输出 + 论文 + 分析
#                无限演化, 非"一万种"
#
# 铁律: 三角密闭(缺一不可)·万物开放(无限衍生)·三角不依赖万物
#
# 加载入口: fish-ecology-assistant/src/project_hub.py → ProjectHub

coordination:
  version: "7.0.0"
  philosophy: "Dao begets One, One begets Two, Two begets Three, Three begets the Myriad"
  root: "D:\\Reasonix"
  last_sync: "2026-06-20"
  changelog:
    - "v7.0.0 (2026-06-20): 道→一→二→三→万物 完整哲学链。英文修正: Myriad Things (非 Ten Thousand Species)。"
    - "v6.0.0 (2026-06-20): 三生万物架构初版"

  # ===== 道 · Dao (外界) =====
  dao:
    description: "外部世界 — 用户的研究问题, 长江生态系统的真实需求"
    entry: "用户命令 → 一"

  # ===== 一 · One (入口) =====
  one:
    description: "太极 — 统一入口, 未分阴阳的初始态"
    project: "fish-ecology-assistant"
    hub: "src/project_hub.py → ProjectHub"

  # ===== 二 · Two (阴阳) =====
  two:
    description: "两仪 — S(知识/阴/静) 与 V(验证/阳/动) 的二元对立统一"
    yin:
      symbol: "S/V0 · 阴"
      project: "fish-ecology-assistant"
      nature: "静 — 知识供给, 状态表征"
    yang:
      symbol: "V/V1 · 阳"
      project: "cognitive-search-engine"
      nature: "动 — 搜索验证, 变化驱动"

  # ===== 三 · Three (三角结构) =====
  three:
    description: "三体 — 矛盾统一的三角最小封闭结构"
    sealed: true
    count: 3
    members:
      fish:
        symbol: "S/V0"
        project: "fish-ecology-assistant"
        role: "知识供给 · 阴"
      cognitive:
        symbol: "V/V1"
        project: "cognitive-search-engine"
        role: "搜索验证 · 阳"
        engine_path: "D:\\Reasonix\\cognitive-search-engine\\"
        loader: "importlib (DirectLoader)"
      eon:
        symbol: "Coordinator"
        project: "eon-core"
        role: "协调内核 · 太极点"

  # ===== 万物 · Myriad (无限演化) =====
  myriad:
    description: "万物 — 三角赋能, 无限衍生, 非一万种"
    sealed: false
    members:
      porpoise:
        symbol: "P₁"
        project: "porpoise-agent"
        role: "江豚专研 — NBHF声学 + 种群评估"
      coilia:
        symbol: "P₂"
        project: "coilia-agent"
        role: "刀鲚专研 — 耳石微化学 + 洄游生态"
      conflict:
        symbol: "C"
        project: "conflict-arbiter"
        role: "冲突仲裁 — 保护级别冲突检测"

  # ===== 求同: 共享协议 =====
  shared:
    philosophy: "dual-core (Panta Rhei + Systems Thinking)"
    rule_ids: ["FB-1","FB-2","CP-1","CP-2","SM-1","SM-2","WF-1","WF-2","PT-1","PT-2","EH-1","EH-2","MO-1","MO-2","DS-1","DS-2","DS-3","DS-4"]
    verification: { min_sources_core_claim: 3, max_iterations: 3 }
    contradiction: { budget_multiplier: 2.5, transformation_threshold: 5 }
    preflight: "read config/agent.yaml before all Skills"

  # ===== 存异: 项目特定 =====
  project_specific:
    fish:
      runtime: "Reasonix Agent + Markdown Skills"
      skill_dir: ".reasonix/skills"
      skill_count: 25
      mcp_count: 22
      pipeline_type: "explicit_stages"
    porpoise:
      runtime: "Python orchestrator + importlib"
      skill_dir: "src/skills"
      skill_count: 16
      mcp_count: 16
      pipeline_type: "orchestrator"
    cognitive:
      runtime: "Python importlib (被调用)"
      skill_dir: "skills"
      skill_count: 3
      mcp_count: 0
      pipeline_type: "rule_engine"

  # ===== 跨项目委托协议 =====
  cross_delegation:
    enabled: true
    protocol: "DELEGATE to {project}: skill={name} context={...}"
    fish_exports: ["stats-assistant","research-analyst","phd-proposal-writer","ima-smart-search"]
    porpoise_exports: ["detect-clicks","estimate-abundance","assess-threats","search-literature"]
    cognitive_exports: ["graph-search-engine","cognitive-species-search","parallel-search"]

  # ===== 搜索引擎注册表 (v3.0 统一) =====
  search_engine_registry:
    scholar:
      category: "academic"
      mcp_server: "scholar"
      tools: ["scholar_search_literature_graph","scholar_search_google_scholar_key_words"]
      priority: 1
      primary: true
    article:
      category: "academic"
      mcp_server: "article"
      tools: ["article_search_literature","article_get_article_details","article_get_references"]
      priority: 2
    scholarly:
      category: "academic"
      mcp_server: "scholarly"
      tools: ["scholarly_search"]
      priority: 3
    baidu_scholar:
      category: "chinese_academic"
      mcp_server: "reasonix_builtin"
      tools: ["web_search"]
      strategy: "site:xueshu.baidu.com"
      language: "zh"
      priority: 4
    cnki:
      category: "chinese_academic"
      mcp_server: "reasonix_builtin"
      tools: ["web_search"]
      strategy: "site:cnki.net"
      language: "zh"
      priority: 5
    wanfang:
      category: "chinese_academic"
      mcp_server: "reasonix_builtin"
      tools: ["web_search"]
      strategy: "site:wanfangdata.com.cn"
      language: "zh"
      priority: 6
    cas:
      category: "chinese_academic"
      mcp_server: "reasonix_builtin"
      tools: ["web_search"]
      strategy: "site:cas.cn OR site:ihb.ac.cn"
      language: "zh"
      priority: 7
    ncbi:
      category: "academic"
      mcp_server: "ncbi"
      tools: ["ncbi_ncbi_esearch","ncbi_ncbi_esummary","ncbi_ncbi_efetch"]
      priority: 8
    tavily:
      category: "web"
      requires_api_key: true
      env_var: "TAVILY_API_KEY"
      mcp_server: "tavily"
      tools: ["tavily_search","tavily_extract"]
      priority: 9
    exa:
      category: "web"
      requires_api_key: true
      env_var: "EXA_API_KEY"
      mcp_server: "exa"
      tools: ["exa_web_search"]
      priority: 10
    cognitive_search:
      category: "cognitive"
      requires_api_key: false
      loader: "DirectLoader (importlib)"
      engine_path: "D:\\Reasonix\\cognitive-search-engine\\"
      tools: ["csearch_species","csearch_graph","csearch_add_paper"]
      priority: 0
      primary: false
      note: "专用认知搜索 — 引擎更新自动生效，零 MCP 开销"
    web_search:
      category: "builtin"
      mcp_server: "reasonix_builtin"
      tools: ["web_search","web_fetch"]
      priority: 11

  # ===== 图谱数据源 =====
  knowledge_graph:
    primary: "D:\\Reasonix\\cognitive-search-engine\\config\\species_graph.yaml"
    variants: "D:\\Reasonix\\fish-ecology-assistant\\config\\species_variants.yaml"
    note: "species_variants.yaml 待合并入 species_graph.yaml。变体生成逻辑在 cognitive-search-engine/src/variant_generator.py"

  # ===== 并行策略 (统一) =====
  parallelism:
    search_engines:
      max_concurrent: 11
      strategy: "fan_out"
    domain_skills:
      max_concurrent: 3
      strategy: "independent"
    cross_project:
      max_concurrent: 2
      strategy: "fan_out"

  # ===== 激活顺序 (统一) =====
  activation_order:
    - { stage: 0, name: "PREFLIGHT", rule: null }
    - { stage: 1, name: "Contradiction Analysis", rule: "CP-1,CP-2" }
    - { stage: 2, name: "Cognitive Search", rule: "DS-1,DS-2" }
    - { stage: 3, name: "Domain Execution", rule: null, parallel: true }
    - { stage: 4, name: "Verification", rule: "FB-1,FB-2" }
    - { stage: 5, name: "Graph Update", rule: "MO-2" }
    - { stage: 6, name: "Review + Adapt", rule: "MO-1,MO-2,DS-1..4" }

  # ===== 进化机制 (v3.2 升级：三项目均有自进化) =====
  evolution:
    cognitive_engine:
      path: "D:\\Reasonix\\cognitive-search-engine\\"
      loader: "importlib"
      update_model: "auto"           # engine 代码更新 → 下次 import 自动生效
      evolution_file: "cognitive-search-engine/config/evolution.yaml"
      self_evolve_skill: "cognitive-search-engine/skills/self-evolve.md"
    fish:
      evolution_file: "fish-ecology-assistant/config/evolution.yaml"
      self_evolve_skill: "fish-ecology-assistant/.reasonix/skills/self-evolve.md"
      component_registry: "fish-ecology-assistant/config/component_registry.yaml"
    porpoise:
      evolution_file: "porpoise-agent/config/evolution.yaml"
      self_evolve_skill: "porpoise-agent/src/skills/self-evolve/SKILL.md"
      component_registry: "porpoise-agent/config/component_registry.yaml"
    graph:
      path: "D:\\Reasonix\\cognitive-search-engine\\config\\species_graph.yaml"
      writeback: "auto"              # 搜索完成后自动回写图谱
      shared_across: ["fish", "porpoise", "cognitive"]
    rules:
      spread: "manual"              # 规则跨项目同步需手动 commit
      coordination: "this file (D:\\Reasonix\\coordination.yaml)"
    cross_feedback:
      enabled: true
      direction: "bi-directional"
      shared_metrics: ["verification_pass_rate", "contradiction_resolution_rate", "false_positive_rate"]
      log_format: "JSONL (shared across all three projects)"